# City Architect - Build verification
# Runs on push and PR to main. Verifies iOS app builds.

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build iOS app
        run: |
          xcodebuild -scheme ARC \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build
